<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Laptop Listings Viewer</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <h1 class="mb-4">Laptop Listings Viewer</h1>
    
    <!-- Dark Mode Toggle -->
    <div class="theme-switch-wrapper">
      <label class="theme-switch" for="checkbox">
        <input type="checkbox" id="checkbox" />
        <div class="slider"></div>
      </label>
      <span class="theme-label">Dark Mode</span>
    </div>
    
    <ul class="nav nav-tabs" id="mainTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button class="nav-link active" id="listings-tab" data-bs-toggle="tab" data-bs-target="#listings-content" type="button" role="tab" aria-controls="listings-content" aria-selected="true">Listings</button>
      </li>
      <li class="nav-item" role="presentation">
        <button class="nav-link" id="configure-tab" data-bs-toggle="tab" data-bs-target="#configure-content" type="button" role="tab" aria-controls="configure-content" aria-selected="false">Configure</button>
      </li>
    </ul>
    
    <div class="tab-content" id="mainTabsContent">
      <!-- Listings Tab -->
      <div class="tab-pane fade show active" id="listings-content" role="tabpanel" aria-labelledby="listings-tab">
        <div class="filter-section">
          <h4>Sort and Filter</h4>
          <div class="mb-3">
            <button id="sort-price-asc" class="btn btn-outline-primary sort-button">Price (Low to High)</button>
            <button id="sort-price-desc" class="btn btn-outline-primary sort-button">Price (High to Low)</button>
            <button id="sort-date-desc" class="btn btn-outline-primary sort-button">Newest First</button>
            <button id="reset-sort" class="btn btn-outline-secondary sort-button">Reset Sort</button>
          </div>
          
          <div class="row">
            <div class="col-md-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="filter-ram-more">
                <label class="form-check-label" for="filter-ram-more">RAM ≥ 32GB</label>
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="filter-screen-small">
                <label class="form-check-label" for="filter-screen-small">Small Screen (≤ 14")</label>
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="filter-screen-highres">
                <label class="form-check-label" for="filter-screen-highres">High Resolution</label>
              </div>
            </div>
            <div class="col-md-3">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="filter-full-info">
                <label class="form-check-label" for="filter-full-info">Full Info Available</label>
              </div>
            </div>
          </div>
          
          <!-- Add search filter dropdown -->
          <div class="row mt-3">
            <div class="col-md-6">
              <label for="filter-search" class="form-label">Filter by Search</label>
              <select class="form-select" id="filter-search">
                <option value="">All Searches</option>
                <!-- Search options will be populated dynamically -->
              </select>
            </div>
          </div>
        </div>
        
        <div id="listings-count" class="alert alert-info">Loading listings...</div>
        
        <div class="row" id="listings-container">
          <div class="col-12 text-center">
            <div class="spinner-border" role="status">
              <span class="visually-hidden">Loading...</span>
            </div>
            <p>Loading listings...</p>
          </div>
        </div>
      </div>
      
      <!-- Configure Tab -->
      <div class="tab-pane fade" id="configure-content" role="tabpanel" aria-labelledby="configure-tab">
        <div class="control-panel">
          <div class="row">
            <div class="col-md-6">
              <h4>Server Status</h4>
              <div id="server-status">
                <div class="d-flex align-items-center">
                  <div class="status-indicator" id="status-light"></div>
                  <span id="status-text">Checking...</span>
                </div>
                <div id="server-details" class="mt-2"></div>
              </div>
            </div>
            <div class="col-md-6">
              <h4>Scraping Schedule</h4>
              <div class="mb-3">
                <label for="schedule-interval" class="form-label">Interval (minutes)</label>
                <input type="number" class="form-control" id="schedule-interval" min="5" max="1440">
              </div>
              <div class="form-check mb-3">
                <input class="form-check-input" type="checkbox" id="schedule-enabled">
                <label class="form-check-label" for="schedule-enabled">
                  Enable scheduled scraping
                </label>
              </div>
              <button class="btn btn-primary" id="save-schedule">Save Schedule</button>
            </div>
          </div>
          
          <hr>
          
          <h4>Search URLs</h4>
          <div id="search-urls-container"></div>
          
          <div class="mb-3">
            <label for="new-url" class="form-label">New Search URL</label>
            <input type="text" class="form-control" id="new-url" placeholder="https://www.kleinanzeigen.de/s-notebooks/...">
          </div>
          <button class="btn btn-primary" id="add-url">Add URL</button>
          <button class="btn btn-success" id="save-urls">Save URLs</button>
          
          <hr>
          
          <h4>Manual Scraping</h4>
          <div class="mb-3">
            <label for="scrape-mode" class="form-label">Mode</label>
            <select class="form-select" id="scrape-mode">
              <option value="both">Scrape & Process</option>
              <option value="scrape">Scrape Only</option>
              <option value="process">Process Only</option>
            </select>
          </div>
          <div class="mb-3">
            <label for="max-listings" class="form-label">Max Listings Per URL</label>
            <input type="number" class="form-control" id="max-listings" min="1" max="100" value="50">
          </div>
          <button class="btn btn-danger" id="start-scraping">Start Scraping</button>
          <div id="scraper-status" class="alert alert-info mt-3 d-none">
            <!-- Status messages will appear here -->
          </div>
        </div>
      </div>
    </div>
  </div>
  
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
  <script src="main.js"></script>
  <script src="darkmode.js"></script>
</body>
</html>
