repos:
  - repo: local
    hooks:
      - id: ruff
        name: Ruff Lint & Fix
        entry: bash -c 'ruff check --fix "$@"; git add "$@"; true' --
        language: system
        types: [python]

      - id: ruff-format
        name: Ruff Format
        entry: bash -c 'ruff format "$@"; git add "$@"; true' --
        language: system
        types: [python]

      - id: eslint-fix
        name: ESLint Fix & Format
        entry: bash -c 'cd frontend && args=(); for arg in "$@"; do args+=("${arg#frontend/}"); done; npx eslint --fix "${args[@]}"; cd ..; git add "$@"; true' --
        language: system
        files: ^frontend/src/.*\.[jt]sx?$
        types: [file]

      - id: check-translations
        name: i18n Translation Check
        entry: node scripts/check_translations.js
        language: system
        pass_filenames: false
        files: ^(frontend/src/.*|scripts/check_translations\.js)$

      - id: tsc-build
        name: TypeScript Compile Check
        entry: bash -c 'cd frontend && npm run build'
        language: system
        pass_filenames: false
        stages: [pre-push]



